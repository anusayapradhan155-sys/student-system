<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* --- CUSTOM COLOR PALETTE --- */
        :root {
            --pistachio: #b2d2a4;
            --pistachio-hover: #98b98b;
            --peach: #ffdac1;
            --peach-hover: #ffbfa0;
            --coffee: #9c7c64;
            --coffee-hover: #7d604b;
            --latte: #f5eedc;
            --text-main: #4a4036;
        }

        /* --- GLOBAL STYLES & ANIMATED BACKGROUND --- */
        body {
            font-family: 'Poppins', sans-serif;
            color: var(--text-main);
            /* Soft animated gradient background */
            background: linear-gradient(135deg, #fdfbfb 0%, var(--latte) 50%, var(--peach) 100%);
            background-size: 200% 200%;
            animation: gradientMove 15s ease infinite;
            min-height: 100vh;
        }
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- GLASSMORPHISM CORE --- */
        .glass {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(156, 124, 100, 0.15);
        }

        /* Overriding Bootstrap Cards */
        .card { background: transparent; border: none; }
        .card-header { background: transparent !important; border-bottom: 1px solid rgba(255,255,255,0.5) !important; padding-bottom: 15px; }
        .card-header h5 { color: var(--coffee); font-weight: 600; }

        /* Overriding Bootstrap Modals to be Glassy */
        .modal-content {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 20px;
        }
        .modal-header { border-bottom: 1px solid rgba(156, 124, 100, 0.2); }
        .modal-header h5 { color: var(--coffee); font-weight: 600; }

        /* --- CUSTOM BUTTONS (Hover & Lift Effects) --- */
        .btn { border-radius: 10px; font-weight: 500; transition: all 0.3s ease; border: none; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        .btn-pistachio { background-color: var(--pistachio); color: var(--text-main); }
        .btn-pistachio:hover { background-color: var(--pistachio-hover); color: white; }

        .btn-peach { background-color: var(--peach); color: var(--text-main); }
        .btn-peach:hover { background-color: var(--peach-hover); color: var(--text-main); }

        .btn-coffee { background-color: var(--coffee); color: white; }
        .btn-coffee:hover { background-color: var(--coffee-hover); color: white; }

        .btn-outline-coffee { border: 2px solid var(--coffee); color: var(--coffee); background: transparent; }
        .btn-outline-coffee:hover { background-color: var(--coffee); color: white; }

        /* --- TABLE UPGRADES (Transparent & Hover scale) --- */
        .table { --bs-table-bg: transparent; color: var(--text-main); margin-bottom: 0; }
        .table thead th { border-bottom: 2px solid rgba(156, 124, 100, 0.3); color: var(--coffee); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; font-size: 0.85rem;}
        .table-hover tbody tr { transition: all 0.3s ease; border-bottom: 1px solid rgba(255,255,255,0.4); }
        .table-hover tbody tr:hover { background-color: rgba(255,255,255,0.6) !important; transform: scale(1.01); box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-radius: 8px;}
        .table td { vertical-align: middle; border: none;}

        .sortable { cursor: pointer; text-decoration: none; position: relative; }
        .sortable::after { content: ' ↕'; font-size: 0.8em; opacity: 0.5; }
        .sortable:hover { color: var(--coffee-hover); }

        /* Form Inputs */
        .form-control, .form-select {
            background: rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.8);
            border-radius: 10px;
            padding: 10px 15px;
            transition: all 0.3s;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(255,255,255,0.9);
            border-color: var(--pistachio);
            box-shadow: 0 0 0 0.25rem rgba(178, 210, 164, 0.25);
        }

        /* --- ENTRY ANIMATIONS --- */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-enter { animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* Badges */
        .badge-present { background-color: var(--pistachio); color: var(--text-main); font-weight: 500; padding: 6px 12px; border-radius: 20px;}
        .badge-absent { background-color: #e29578; color: white; font-weight: 500; padding: 6px 12px; border-radius: 20px;}
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg glass mt-3 mx-4 mb-5 px-4 animate-enter">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1 fw-bold" style="color: var(--coffee);">🎓 University Portal</span>
        <div class="d-flex">
            <button class="btn btn-outline-coffee btn-sm me-2 d-none" id="changePassBtn" onclick="openChangePassword()">Change Password</button>
            <button class="btn btn-peach btn-sm d-none" id="logoutBtn" onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<div class="container">

    <div class="row justify-content-center animate-enter" id="authSection" style="animation-delay: 0.1s;">
        <div class="col-md-5">
            <div class="card glass p-2">
                <div class="card-header d-flex justify-content-between align-items-center mt-2">
                    <h5 class="mb-0" id="authTitle">Welcome Back</h5>
                    <button class="btn btn-sm btn-outline-secondary" style="border:none;" onclick="toggleAuthMode()" id="authToggleBtn">Need an account?</button>
                </div>
                <div class="card-body">
                    <form id="loginForm">
                        <div class="mb-3"><label class="form-label text-muted small text-uppercase fw-bold">Username</label><input type="text" class="form-control" id="loginUsername" required></div>
                        <div class="mb-4"><label class="form-label text-muted small text-uppercase fw-bold">Password</label><input type="password" class="form-control" id="loginPassword" required></div>
                        <button type="submit" class="btn btn-coffee w-100 py-2">Sign In</button>
                    </form>
                    <form id="signupForm" class="d-none">
                        <div class="mb-3"><label class="form-label text-muted small fw-bold">Full Name</label><input type="text" class="form-control" id="regName" required></div>
                        <div class="mb-3"><label class="form-label text-muted small fw-bold">Email</label><input type="email" class="form-control" id="regEmail" required></div>
                        <div class="mb-3"><label class="form-label text-muted small fw-bold">Department</label><input type="text" class="form-control" id="regDepartment" required></div>
                        <hr style="border-color: rgba(0,0,0,0.1);">
                        <div class="mb-3"><label class="form-label text-muted small fw-bold">Choose Username</label><input type="text" class="form-control" id="regUsername" required></div>
                        <div class="mb-4"><label class="form-label text-muted small fw-bold">Choose Password</label><input type="password" class="form-control" id="regPassword" required></div>
                        <button type="submit" class="btn btn-pistachio w-100 py-2">Create Account</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="row d-none" id="dashboardSection">

        <div class="col-md-3 animate-enter" id="adminFormColumn" style="animation-delay: 0.1s;">
            <div class="card glass mb-4 p-2">
                <div class="card-header mt-2"><h5 class="mb-0" id="formTitle">Manage Profile</h5></div>
                <div class="card-body">
                    <form id="studentForm">
                        <input type="hidden" id="studentId">
                        <div class="mb-3"><label class="form-label text-muted small fw-bold">Name</label><input type="text" class="form-control" id="name" required></div>
                        <div class="mb-3"><label class="form-label text-muted small fw-bold">Email</label><input type="email" class="form-control" id="email" required></div>
                        <div class="mb-4"><label class="form-label text-muted small fw-bold">Department</label><input type="text" class="form-control" id="department" required></div>
                        <button type="submit" class="btn btn-pistachio w-100 mb-2" id="submitBtn">Save Student</button>
                        <button type="button" class="btn btn-peach w-100 d-none" id="cancelBtn" onclick="resetForm()">Cancel Edit</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-9 animate-enter" id="tableColumn" style="animation-delay: 0.2s;">
            <div class="card glass p-3">
                <div class="card-body table-responsive">
                    <table class="table table-hover align-middle">
                        <thead>
                        <tr>
                            <th><span class="sortable" onclick="changeSort('id')">ID</span></th>
                            <th><span class="sortable" onclick="changeSort('name')">Student</span></th>
                            <th><span class="sortable" onclick="changeSort('department')">Department</span></th>
                            <th id="actionsHeader" class="text-end">Actions</th>
                        </tr>
                        </thead>
                        <tbody id="studentTableBody"></tbody>
                    </table>

                    <nav class="mt-4">
                        <ul class="pagination justify-content-center" id="paginationControls">
                            <style>
                                .page-link { border-radius: 8px; margin: 0 4px; border: none; color: var(--coffee); background: rgba(255,255,255,0.5); }
                                .page-link:hover { background: rgba(255,255,255,0.8); color: var(--coffee-hover); }
                                .page-item.active .page-link { background-color: var(--coffee); color: white; }
                            </style>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="changePasswordModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered"><div class="modal-content shadow-lg p-2">
        <div class="modal-header border-0"><h5 class="modal-title">Security Settings</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
            <form id="changePasswordForm">
                <div class="mb-3"><label class="form-label text-muted small fw-bold">Current Password</label><input type="password" class="form-control" id="oldPassword" required></div>
                <div class="mb-4"><label class="form-label text-muted small fw-bold">New Password</label><input type="password" class="form-control" id="newPassword" required></div>
                <button type="submit" class="btn btn-coffee w-100">Update Password</button>
            </form>
        </div>
    </div></div>
</div>

<div class="modal fade" id="markAttendanceModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered"><div class="modal-content shadow-lg p-2">
        <div class="modal-header border-0"><h5 class="modal-title">Log Attendance: <span id="attStudentName" style="color: var(--pistachio-hover);"></span></h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
            <form id="attendanceForm">
                <input type="hidden" id="attStudentId">
                <div class="mb-3"><label class="form-label text-muted small fw-bold">Date</label><input type="date" class="form-control" id="attDate" required></div>
                <div class="mb-4"><label class="form-label text-muted small fw-bold">Status</label><select class="form-select" id="attStatus" required><option value="PRESENT">Present</option><option value="ABSENT">Absent</option></select></div>
                <button type="submit" class="btn btn-pistachio w-100">Save Record</button>
            </form>
        </div>
    </div></div>
</div>

<div class="modal fade" id="viewAttendanceModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-scrollable modal-dialog-centered"><div class="modal-content shadow-lg p-2">
        <div class="modal-header border-0"><h5 class="modal-title">Attendance Log: <span id="historyStudentName" style="color: var(--coffee);"></span></h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
            <table class="table text-center align-middle">
                <thead><tr><th class="border-0 text-muted">Date</th><th class="border-0 text-muted">Status</th></tr></thead>
                <tbody id="attendanceHistoryBody"></tbody>
            </table>
        </div>
    </div></div>
</div>

<div class="modal fade" id="addGradeModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered"><div class="modal-content shadow-lg p-2">
        <div class="modal-header border-0"><h5 class="modal-title">Assign Grade: <span id="gradeStudentName" style="color: var(--coffee);"></span></h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
            <form id="gradeForm">
                <input type="hidden" id="gradeStudentId">
                <div class="mb-3"><label class="form-label text-muted small fw-bold">Subject / Course</label><input type="text" class="form-control" id="gradeSubject" placeholder="e.g. Data Structures" required></div>
                <div class="mb-4"><label class="form-label text-muted small fw-bold">Score (Percentage)</label><input type="number" step="0.01" class="form-control" id="gradeScore" placeholder="e.g. 92.5" required></div>
                <button type="submit" class="btn btn-peach w-100 fw-bold" style="color: var(--text-main);">Publish Grade</button>
            </form>
        </div>
    </div></div>
</div>

<div class="modal fade" id="viewGradesModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-scrollable modal-dialog-centered"><div class="modal-content shadow-lg p-2">
        <div class="modal-header border-0"><h5 class="modal-title">Report Card: <span id="reportStudentName" style="color: var(--coffee);"></span></h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
            <table class="table text-center align-middle">
                <thead><tr><th class="border-0 text-muted">Subject</th><th class="border-0 text-muted">Score</th></tr></thead>
                <tbody id="gradesHistoryBody"></tbody>
            </table>
        </div>
    </div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const apiUrl = 'http://localhost:8080/api';
    let authHeaders = {};
    let currentUserRole = '';
    let activeUsername = '';

    let isEditMode = false; let currentPage = 1; let pageSize = 5; let currentSortField = 'id'; let currentSortDir = 'asc';

    let markAttModalObj = null; let viewAttModalObj = null;
    let addGradeModalObj = null; let viewGradesModalObj = null; let changePassModalObj = null;

    document.addEventListener("DOMContentLoaded", function() {
        markAttModalObj = new bootstrap.Modal(document.getElementById('markAttendanceModal'));
        viewAttModalObj = new bootstrap.Modal(document.getElementById('viewAttendanceModal'));
        addGradeModalObj = new bootstrap.Modal(document.getElementById('addGradeModal'));
        viewGradesModalObj = new bootstrap.Modal(document.getElementById('viewGradesModal'));
        changePassModalObj = new bootstrap.Modal(document.getElementById('changePasswordModal'));
        document.getElementById('attDate').valueAsDate = new Date();
    });

    // --- AUTHENTICATION LOGIC ---
    function toggleAuthMode() {
        const loginForm = document.getElementById('loginForm'); const signupForm = document.getElementById('signupForm');
        const title = document.getElementById('authTitle'); const btn = document.getElementById('authToggleBtn');
        if (loginForm.classList.contains('d-none')) {
            loginForm.classList.remove('d-none'); signupForm.classList.add('d-none');
            title.innerText = "Welcome Back"; btn.innerText = "Need an account?";
        } else {
            loginForm.classList.add('d-none'); signupForm.classList.remove('d-none');
            title.innerText = "Create Account"; btn.innerText = "Back to Login";
        }
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const user = document.getElementById('loginUsername').value; const pass = document.getElementById('loginPassword').value;
        const tempHeaders = { 'Content-Type': 'application/json', 'Authorization': 'Basic ' + btoa(user + ':' + pass) };

        fetch(`${apiUrl}/auth/me`, { headers: tempHeaders })
            .then(response => { if (!response.ok) throw new Error("Invalid Credentials"); return response.json(); })
            .then(userData => {
                authHeaders = tempHeaders; currentUserRole = userData.role; activeUsername = user;
                applyRoleRestrictions();
                document.getElementById('authSection').classList.add('d-none');
                document.getElementById('dashboardSection').classList.remove('d-none');
                document.getElementById('logoutBtn').classList.remove('d-none');
                document.getElementById('changePassBtn').classList.remove('d-none');
                loadStudents();
            }).catch(error => alert(error.message));
    });

    function openChangePassword() { changePassModalObj.show(); }

    document.getElementById('changePasswordForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const oldPass = document.getElementById('oldPassword').value; const newPass = document.getElementById('newPassword').value;
        fetch(`${apiUrl}/auth/change-password`, { method: 'PUT', headers: authHeaders, body: JSON.stringify({ oldPassword: oldPass, newPassword: newPass }) })
            .then(async response => {
                const text = await response.text();
                if (response.ok) { alert(text); authHeaders['Authorization'] = 'Basic ' + btoa(activeUsername + ':' + newPass); changePassModalObj.hide(); document.getElementById('changePasswordForm').reset(); }
                else { alert("Error: " + text); }
            });
    });

    document.getElementById('signupForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const payload = {
            name: document.getElementById('regName').value, email: document.getElementById('regEmail').value, department: document.getElementById('regDepartment').value,
            username: document.getElementById('regUsername').value, password: document.getElementById('regPassword').value
        };
        fetch(`${apiUrl}/auth/register`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
            .then(async response => { const text = await response.text(); if (response.ok) { alert(text); document.getElementById('signupForm').reset(); toggleAuthMode(); } else { alert("Error: " + text); } });
    });

    function logout() {
        authHeaders = {}; currentUserRole = ''; activeUsername = ''; document.getElementById('loginForm').reset();
        document.getElementById('authSection').classList.remove('d-none'); document.getElementById('dashboardSection').classList.add('d-none');
        document.getElementById('logoutBtn').classList.add('d-none'); document.getElementById('changePassBtn').classList.add('d-none');
    }

    // --- DASHBOARD LOGIC ---
    function applyRoleRestrictions() {
        const formCol = document.getElementById('adminFormColumn'); const tableCol = document.getElementById('tableColumn');
        if (currentUserRole === 'ROLE_STUDENT') { formCol.classList.add('d-none'); tableCol.classList.replace('col-md-9', 'col-md-12'); }
        else { formCol.classList.remove('d-none'); tableCol.classList.replace('col-md-12', 'col-md-9'); }
    }

    function loadStudents() {
        fetch(`${apiUrl}/students/paginated?pageNo=${currentPage}&pageSize=${pageSize}&sortField=${currentSortField}&sortDir=${currentSortDir}`, { headers: authHeaders })
            .then(response => { if (response.status === 401) { logout(); throw new Error("Session expired."); } return response.json(); })
            .then(data => {
                const tableBody = document.getElementById('studentTableBody'); tableBody.innerHTML = '';
                data.content.forEach(student => {

                    // Read-Only buttons styled subtly
                    let actionButtons = `
                    <button class="btn btn-sm btn-outline-secondary me-1 mb-1" style="background: rgba(255,255,255,0.5); border-color: transparent;" onclick="viewAttendance(${student.id}, '${student.name}')">👁️ Log</button>
                    <button class="btn btn-sm btn-outline-coffee me-1 mb-1" onclick="viewGrades(${student.id}, '${student.name}')">📊 Grades</button>
                `;

                    if(currentUserRole === 'ROLE_ADMIN') {
                        // Action buttons styled with new palette
                        actionButtons = `
                        <button class="btn btn-sm btn-pistachio me-1 mb-1" onclick="openMarkAttendance(${student.id}, '${student.name}')">+ Att</button>
                        <button class="btn btn-sm btn-peach me-1 mb-1 fw-bold" style="color:var(--text-main);" onclick="openAddGrade(${student.id}, '${student.name}')">+ Grade</button>
                        ${actionButtons}
                        <button class="btn btn-sm btn-outline-secondary me-1 mb-1" style="border:none;" onclick="editStudent(${student.id}, '${student.name}', '${student.email}', '${student.department}')">Edit</button>
                        <button class="btn btn-sm btn-outline-danger mb-1" style="border:none;" onclick="deleteStudent(${student.id})">Del</button>
                    `;
                    }

                    tableBody.innerHTML += `<tr><td class="text-muted">#${student.id}</td><td class="fw-bold" style="color: var(--coffee);">${student.name}</td><td>${student.department}</td><td class="text-end">${actionButtons}</td></tr>`;
                });
                renderPagination(data.totalPages);
            }).catch(err => console.error(err));
    }

    // --- ATTENDANCE & GRADING API ---
    function openMarkAttendance(id, name) { document.getElementById('attStudentId').value = id; document.getElementById('attStudentName').innerText = name; markAttModalObj.show(); }
    document.getElementById('attendanceForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const payload = { studentId: document.getElementById('attStudentId').value, date: document.getElementById('attDate').value, status: document.getElementById('attStatus').value };
        fetch(`${apiUrl}/attendance/mark`, { method: 'POST', headers: authHeaders, body: JSON.stringify(payload) }).then(async response => { const text = await response.text(); if(response.ok) { markAttModalObj.hide(); } else { alert("Error: " + text); } });
    });

    function viewAttendance(id, name) {
        document.getElementById('historyStudentName').innerText = name;
        fetch(`${apiUrl}/attendance/student/${id}`, { headers: authHeaders }).then(res => res.json()).then(data => {
            const tbody = document.getElementById('attendanceHistoryBody'); tbody.innerHTML = '';
            if(data.length === 0) { tbody.innerHTML = '<tr><td colspan="2" class="text-muted">No records found.</td></tr>'; }
            data.forEach(record => {
                const badgeClass = record.status === 'PRESENT' ? 'badge-present' : 'badge-absent';
                tbody.innerHTML += `<tr><td>${record.date}</td><td><span class="${badgeClass}">${record.status}</span></td></tr>`;
            });
            viewAttModalObj.show();
        });
    }

    function openAddGrade(id, name) { document.getElementById('gradeStudentId').value = id; document.getElementById('gradeStudentName').innerText = name; addGradeModalObj.show(); }
    document.getElementById('gradeForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const payload = { studentId: document.getElementById('gradeStudentId').value, subject: document.getElementById('gradeSubject').value, score: parseFloat(document.getElementById('gradeScore').value) };
        fetch(`${apiUrl}/grades/add`, { method: 'POST', headers: authHeaders, body: JSON.stringify(payload) }).then(async response => { const text = await response.text(); if(response.ok) { addGradeModalObj.hide(); document.getElementById('gradeForm').reset(); } else { alert("Error: " + text); } });
    });

    function viewGrades(id, name) {
        document.getElementById('reportStudentName').innerText = name;
        fetch(`${apiUrl}/grades/student/${id}`, { headers: authHeaders }).then(res => res.json()).then(data => {
            const tbody = document.getElementById('gradesHistoryBody'); tbody.innerHTML = '';
            if(data.length === 0) { tbody.innerHTML = '<tr><td colspan="2" class="text-muted">No grades found.</td></tr>'; }
            data.forEach(record => {
                let textClass = record.score >= 50 ? 'text-success' : 'text-danger';
                tbody.innerHTML += `<tr><td class="fw-medium">${record.subject}</td><td class="fw-bold ${textClass}">${record.score}%</td></tr>`;
            });
            viewGradesModalObj.show();
        });
    }

    // --- STUDENT CRUD & PAGINATION ---
    function changeSort(field) { currentSortField = field; currentSortDir = currentSortDir === 'asc' ? 'desc' : 'asc'; currentPage = 1; loadStudents(); }
    function renderPagination(totalPages) { const paginationList = document.getElementById('paginationControls'); paginationList.innerHTML = ''; for (let i = 1; i <= totalPages; i++) { paginationList.innerHTML += `<li class="page-item ${i === currentPage ? 'active' : ''}"><button class="page-link shadow-sm" onclick="changePage(${i})">${i}</button></li>`; } }
    function changePage(pageNo) { currentPage = pageNo; loadStudents(); }

    document.getElementById('studentForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const id = document.getElementById('studentId').value;
        const student = { name: document.getElementById('name').value, email: document.getElementById('email').value, department: document.getElementById('department').value };
        const fetchUrl = isEditMode ? `${apiUrl}/students/update/${id}` : `${apiUrl}/students/add`; const fetchMethod = isEditMode ? 'PUT' : 'POST';
        fetch(fetchUrl, { method: fetchMethod, headers: authHeaders, body: JSON.stringify(student) }).then(async response => { const text = await response.text(); if(!response.ok) throw new Error(text); resetForm(); loadStudents(); }).catch(error => alert(error.message));
    });

    function editStudent(id, name, email, department) { isEditMode = true; document.getElementById('formTitle').innerText = "Edit Student"; document.getElementById('submitBtn').innerText = "Update Record"; document.getElementById('submitBtn').classList.replace('btn-pistachio', 'btn-coffee'); document.getElementById('cancelBtn').classList.remove('d-none'); document.getElementById('studentId').value = id; document.getElementById('name').value = name; document.getElementById('email').value = email; document.getElementById('department').value = department; }
    function resetForm() { isEditMode = false; document.getElementById('studentForm').reset(); document.getElementById('formTitle').innerText = "Manage Profile"; document.getElementById('submitBtn').innerText = "Save Student"; document.getElementById('submitBtn').classList.replace('btn-coffee', 'btn-pistachio'); document.getElementById('cancelBtn').classList.add('d-none'); document.getElementById('studentId').value = ''; }
    function deleteStudent(id) { if(confirm('Are you sure you want to delete this profile?')) { fetch(`${apiUrl}/students/${id}`, { method: 'DELETE', headers: authHeaders }).then(res => res.text()).then(data => { loadStudents(); }); } }
</script>
